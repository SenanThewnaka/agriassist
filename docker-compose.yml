services:
  app:
    build:
      context: .
      target: app
    image: agriassist-app
    container_name: agriassist-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
      - analysis-engine
    networks:
      - agriassist-network

  analysis-engine:
    build:
      context: ./analysis_engine
    container_name: agriassist-engine
    restart: unless-stopped
    ports:
      - "5056:5056"
    environment:
      - PYTHONUNBUFFERED=1
      - ENGINE_PROVIDER_ALPHA_KEY=${ENGINE_PROVIDER_ALPHA_KEY}
      - ENGINE_PROVIDER_BETA_KEY=${ENGINE_PROVIDER_BETA_KEY}
    volumes:
      - ./analysis_engine:/app
    networks:
      - agriassist-network


  db:
    image: mysql:8.0
    container_name: agriassist-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-agriassist}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-sail}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - agriassist-network

  reverb:
    image: agriassist-app
    container_name: agriassist-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - REVERB_APP_ID=${REVERB_APP_ID:-123456}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-agriassistkey}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-agriassistsecret}
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    ports:
      - "8080:8080"
    depends_on:
      - app
    networks:
      - agriassist-network

  worker:
    image: agriassist-app
    container_name: agriassist-worker
    restart: unless-stopped
    command: php artisan queue:work --timeout=300
    depends_on:
      - app
      - db
    networks:
      - agriassist-network

  scheduler:
    image: agriassist-app
    container_name: agriassist-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    depends_on:
      - app
      - db
    networks:
      - agriassist-network

  nginx:
    image: nginx:alpine
    container_name: agriassist-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - agriassist-network

networks:
  agriassist-network:
    driver: bridge

volumes:
  db-data:
